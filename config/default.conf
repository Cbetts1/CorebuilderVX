# =============================================================================
# CoreBuilderVX — Default Configuration
# =============================================================================

CBX_VERSION="1.2.0"

# --- UI settings
CBX_NO_COLOR="${CBX_NO_COLOR:-0}"
CBX_TERM_WIDTH="${COLUMNS:-80}"

# --- Paths
CBX_DATA_DIR="${CBX_DATA_DIR:-$CBX_ROOT/data}"
CBX_LOG_DIR="${CBX_LOG_DIR:-$CBX_ROOT/logs}"
CBX_BUILD_DIR="${CBX_BUILD_DIR:-$CBX_ROOT/builds}"
CBX_TMP_DIR="${TMPDIR:-/tmp}/cbx"

# --- Backend
CBX_BACKEND="${CBX_BACKEND:-auto}"   # auto | python | node | none
CBX_API_PORT="${CBX_API_PORT:-8765}"
CBX_API_HOST="${CBX_API_HOST:-127.0.0.1}"

# --- Frontend
CBX_FRONTEND_PORT="${CBX_FRONTEND_PORT:-8766}"

# --- OS Builder defaults
CBX_OS_TYPE="${CBX_OS_TYPE:-minimal}"   # minimal | standard | full
CBX_OS_ARCH="${CBX_OS_ARCH:-auto}"      # auto | x86_64 | aarch64 | armv7

# --- Boot Sim
CBX_BOOTSIM_STEPS="${CBX_BOOTSIM_STEPS:-10}"
CBX_BOOTSIM_DELAY="${CBX_BOOTSIM_DELAY:-0.2}"

# --- VM
CBX_VM_RAM="${CBX_VM_RAM:-256}"         # MB
CBX_VM_DISK="${CBX_VM_DISK:-512}"       # MB

# --- AI Runner
CBX_AI_MODEL="${CBX_AI_MODEL:-none}"    # none | llama | gpt2 | phi
CBX_AI_MAX_TOKENS="${CBX_AI_MAX_TOKENS:-128}"

# --- Updater
CBX_UPDATE_SOURCE="${CBX_UPDATE_SOURCE:-https://github.com/Cbetts1/CorebuilderVX}"
CBX_UPDATE_BRANCH="${CBX_UPDATE_BRANCH:-main}"
CBX_AUTO_UPDATE="${CBX_AUTO_UPDATE:-0}"  # 0=manual, 1=auto-check on launch

# --- Logging
CBX_LOG_LEVEL="${CBX_LOG_LEVEL:-info}"  # debug | info | warn | error
CBX_LOG_FILE="${CBX_LOG_DIR}/cbx.log"

# --- Ensure required dirs exist
mkdir -p "$CBX_DATA_DIR" "$CBX_LOG_DIR" "$CBX_BUILD_DIR" "$CBX_TMP_DIR"
