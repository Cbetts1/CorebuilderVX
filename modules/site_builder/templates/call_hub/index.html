<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Call Hub</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0c29; color: #f0f0f0;
           display: flex; flex-direction: column; align-items: center; justify-content: center;
           min-height: 100vh; }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; letter-spacing: 1px; }
    p.sub { color: #aaa; font-size: 0.95rem; margin-bottom: 2.5rem; }
    .call-ring { width: 140px; height: 140px; border-radius: 50%; background: #1a1a4e;
                 display: flex; align-items: center; justify-content: center;
                 font-size: 3.5rem; margin: 0 auto 2rem;
                 box-shadow: 0 0 0 0 rgba(100,100,255,0.5);
                 animation: pulse 2s infinite; }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(100,100,255,0.5); }
      70%  { box-shadow: 0 0 0 28px rgba(100,100,255,0); }
      100% { box-shadow: 0 0 0 0 rgba(100,100,255,0); }
    }
    .controls { display: flex; gap: 1.5rem; margin-bottom: 2rem; }
    .btn { width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer;
           font-size: 1.6rem; display: flex; align-items: center; justify-content: center;
           transition: transform 0.15s; }
    .btn:hover { transform: scale(1.1); }
    .btn-call { background: #27ae60; }
    .btn-end  { background: #e74c3c; }
    .btn-mute { background: #2c3e50; }
    .status { font-size: 0.9rem; color: #888; margin-top: 0.5rem; }
    .participants { margin-top: 2rem; display: flex; gap: 1rem; }
    .participant { background: #1a1a4e; border-radius: 8px; padding: 0.75rem 1.25rem;
                   font-size: 0.9rem; text-align: center; }
    .participant .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
                        background: #27ae60; margin-right: 5px; }
  </style>
</head>
<body>
  <h1>📞 Call Hub</h1>
  <p class="sub">A ready-to-customise voice/video call landing page.</p>

  <div class="call-ring" id="avatar">📞</div>

  <div class="controls">
    <button class="btn btn-mute" title="Mute" onclick="toggleMute(this)">🎤</button>
    <button class="btn btn-call" title="Join Call" onclick="joinCall()">✅</button>
    <button class="btn btn-end"  title="End Call"  onclick="endCall()">📵</button>
  </div>
  <div class="status" id="status">Ready to connect</div>

  <div class="participants">
    <div class="participant"><span class="dot"></span>Alice</div>
    <div class="participant"><span class="dot"></span>Bob</div>
    <div class="participant" style="opacity:0.5">Charlie (away)</div>
  </div>

  <script>
    let muted = false;
    function toggleMute(btn) {
      muted = !muted;
      btn.textContent = muted ? '🔇' : '🎤';
      document.getElementById('status').textContent = muted ? 'Muted' : 'Unmuted';
    }
    function joinCall() {
      document.getElementById('status').textContent = '🟢 Connected';
      document.getElementById('avatar').textContent = '🎙️';
    }
    function endCall() {
      document.getElementById('status').textContent = '🔴 Call ended';
      document.getElementById('avatar').textContent = '📞';
    }
  </script>
</body>
</html>
