<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Page</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee;
           display: flex; flex-direction: column; height: 100vh; }
    header { background: #16213e; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.75rem;
             border-bottom: 1px solid #0f3460; }
    header .avatar { width: 36px; height: 36px; border-radius: 50%; background: #e94560;
                     display: flex; align-items: center; justify-content: center; font-weight: 700; }
    header h1 { font-size: 1.1rem; }
    header span { font-size: 0.8rem; color: #4caf50; margin-left: 0.5rem; }
    #chat-window { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
    .msg { max-width: 70%; padding: 0.65rem 1rem; border-radius: 12px; font-size: 0.95rem; line-height: 1.5; }
    .msg.incoming { background: #16213e; border-bottom-left-radius: 3px; align-self: flex-start; }
    .msg.outgoing { background: #e94560; border-bottom-right-radius: 3px; align-self: flex-end; }
    .msg .meta    { font-size: 0.72rem; color: #888; margin-top: 0.3rem; }
    #chat-form { display: flex; gap: 0.5rem; padding: 1rem; background: #16213e;
                 border-top: 1px solid #0f3460; }
    #chat-input { flex: 1; background: #0f3460; border: 1px solid #1a4a7a; border-radius: 8px;
                  padding: 0.6rem 0.9rem; color: #eee; font-size: 0.95rem; outline: none; }
    #chat-input:focus { border-color: #e94560; }
    #send-btn { background: #e94560; color: #fff; border: none; border-radius: 8px;
                padding: 0.6rem 1.1rem; cursor: pointer; font-size: 0.95rem; }
    #send-btn:hover { background: #c73652; }
  </style>
</head>
<body>
  <header>
    <div class="avatar">C</div>
    <div>
      <h1>Chat Page</h1>
      <span>● Online</span>
    </div>
  </header>
  <div id="chat-window">
    <div class="msg incoming">
      👋 Welcome to Chat Page! This template gives you a ready-to-style chat UI.
      <div class="meta">System • just now</div>
    </div>
    <div class="msg outgoing">
      Hello! Looking good. I'll customise this for my project.
      <div class="meta">You • just now</div>
    </div>
  </div>
  <form id="chat-form">
    <input id="chat-input" type="text" placeholder="Type a message…" autocomplete="off" />
    <button id="send-btn" type="submit">Send</button>
  </form>
  <script>
    const form   = document.getElementById('chat-form');
    const input  = document.getElementById('chat-input');
    const window_ = document.getElementById('chat-window');

    form.addEventListener('submit', e => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      const msg = document.createElement('div');
      msg.className = 'msg outgoing';
      const textNode = document.createTextNode(text);
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = 'You • just now';
      msg.appendChild(textNode);
      msg.appendChild(meta);
      window_.appendChild(msg);
      window_.scrollTop = window_.scrollHeight;
      input.value = '';
      // Stub auto-reply
      setTimeout(() => {
        const reply = document.createElement('div');
        reply.className = 'msg incoming';
        const replyText = document.createTextNode(`[Auto-reply] You said: "${text}"`);
        const replyMeta = document.createElement('div');
        replyMeta.className = 'meta';
        replyMeta.textContent = 'Bot • just now';
        reply.appendChild(replyText);
        reply.appendChild(replyMeta);
        window_.appendChild(reply);
        window_.scrollTop = window_.scrollHeight;
      }, 600);
    });
  </script>
</body>
</html>
